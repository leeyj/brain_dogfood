<div class="help-sheet">
    <h3 style="color:var(--accent); margin-bottom:15px;">💡 고급 사용 팁</h3>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <div style="padding: 20px; background: rgba(56, 189, 248, 0.05); border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.1);">
            <p style="margin-bottom:10px; color: var(--accent);"><b>1. 검색창에서 '?' 입력</b></p>
            <p style="font-size: 0.9rem; color: var(--muted); line-height: 1.5;">검색 바에 '?' 한 글자만 입력하면 마우스 조작 없이 즉시 이 도움말 창이 열립니다.</p>
        </div>
        <div style="padding: 20px; background: rgba(139, 92, 246, 0.05); border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.1);">
            <p style="margin-bottom:10px; color: var(--ai-accent);"><b>2. Alt + 숫자키 (왼손의 법칙)</b></p>
            <p style="font-size: 0.9rem; color: var(--muted); line-height: 1.5;">사이드바 메뉴를 클릭할 필요 없이 Alt + 1~9 키만으로 모든 네비게이션을 수행할 수 있습니다.</p>
        </div>
        <div style="padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
            <p style="margin-bottom:10px;"><b>3. Alt + 클릭 (비주얼 링커)</b></p>
            <p style="font-size: 0.9rem; color: var(--muted); line-height: 1.5;">지식 맵 모드에서 메모 카드를 Alt를 누른 채 클릭하면 노드 간의 논리적 관계를 연결할 수 있습니다.</p>
        </div>
    </div>
</div>
