<!-- Password Prompt Modal -->
<div id="passwordPromptModal" class="modal">
    <div class="modal-content glass-panel" style="max-width: 400px; padding: 25px; position: relative;">
        <button class="close-modal-btn" id="closePasswordPromptBtn">×</button>
        <h2 id="passwordPromptTitle" style="margin-bottom: 20px; font-weight: 800; background: linear-gradient(135deg, #38bdf8, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🔓 암호 입력</h2>
        
        <div style="margin-bottom: 20px;">
            <p id="passwordPromptLabel" style="font-size: 0.95rem; color: #cbd5e1; margin-bottom: 10px;"></p>
            <div class="input-wrapper" style="position: relative;">
                <input type="password" id="passwordPromptInput" class="meta-field" style="width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px;" autofocus>
            </div>
        </div>

        <div class="settings-actions" style="border-top: none; margin-top: 10px; padding-top: 0;">
            <button id="cancelPasswordPromptBtn" class="action-btn" data-i18n="btn_discard">취소</button>
            <button id="confirmPasswordPromptBtn" class="primary-btn" data-i18n="btn_unlock">해독</button>
        </div>
    </div>
</div>
